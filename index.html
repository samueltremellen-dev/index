<!DOCTYPE html>
<html lang="en">
<head>
  <!-- 1. Load the Headway library first -->
<script src="https://cdn.headwayapp.co/widget.js" async></script>

<!-- 2. Initialize the widget -->
<script>
  // Use a check to ensure Headway is loaded if the script is async
  window.addEventListener('load', function() {
    var config = {
      selector: ".headway-badge",
      account: "yEPaOJ"
    };
    if (window.Headway) {
      Headway.init(config);
    }
  });
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sam Tremellen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --ink: #1a1812;
      --muted: #7a7060;
      --accent: #c8522a;
      --accent-light: #f0e6de;
      --border: #d6cfc2;
      --card: #fffdf8;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* — HEADER — */
    header {
      border-bottom: 1.5px solid var(--border);
      padding: 2rem 3rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      animation: fadeDown 0.6s ease both;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    header .tag {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 0.3em 0.7em;
      border-radius: 2px;
    }

    /* — MAIN — */
    main {
      flex: 1;
      padding: 3rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    /* — HERO — */
    .hero {
      margin-bottom: 3.5rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .hero p {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: var(--muted);
      line-height: 1.5;
      max-width: 520px;
    }

    /* — STATUS CARD — */
    .status-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 1.4rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
      font-size: 0.82rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf82;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(76,175,130,0.2);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(76,175,130,0.2); }
      50% { box-shadow: 0 0 0 6px rgba(76,175,130,0.08); }
    }

    .status-text { color: var(--muted); }
    .status-text strong { color: var(--ink); }

    /* — BUTTON GRID — */
    .buttons-section {
      margin-bottom: 3rem;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.8rem;
    }

    /* Base button */
    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 4px;
      padding: 0.75em 1.2em;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5em;
      text-decoration: none;
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
    }

    /* Primary */
    .btn-primary {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }
    .btn-primary:hover { background: #332e25; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,24,18,0.2); }
    .btn-primary:active { transform: translateY(0); box-shadow: none; }

    /* Secondary */
    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border-color: var(--ink);
    }
    .btn-secondary:hover { background: var(--ink); color: var(--bg); transform: translateY(-1px); }
    .btn-secondary:active { transform: translateY(0); }

    /* Accent */
    .btn-accent {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-accent:hover { background: #b04520; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(200,82,42,0.3); }
    .btn-accent:active { transform: translateY(0); }

    /* Ghost */
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }
    .btn-ghost:hover { border-color: var(--ink); color: var(--ink); transform: translateY(-1px); }
    .btn-ghost:active { transform: translateY(0); }

    /* Warm */
    .btn-warm {
      background: var(--accent-light);
      color: var(--accent);
      border-color: #e8c4b0;
    }
    .btn-warm:hover { background: #e8d4c8; transform: translateY(-1px); }

    /* Danger */
    .btn-danger {
      background: transparent;
      color: #c0392b;
      border-color: #c0392b;
    }
    .btn-danger:hover { background: #c0392b; color: #fff; transform: translateY(-1px); }

    /* Disabled */
    .btn-disabled {
      background: var(--border);
      color: var(--muted);
      border-color: var(--border);
      cursor: not-allowed;
      opacity: 0.7;
    }

    /* Loading */
    .btn-loading {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
      cursor: wait;
    }

    .spinner {
      width: 12px;
      height: 12px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* — TOAST — */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--ink);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 0.85em 1.4em;
      border-radius: 4px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s ease;
      pointer-events: none;
      z-index: 100;
      max-width: 280px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* — LOG — */
    .log-section { margin-bottom: 3rem; }

    .log {
      background: var(--ink);
      color: #a8c890;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      min-height: 120px;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.8;
    }

    .log-line { display: flex; gap: 0.8em; }
    .log-time { color: #5a8070; flex-shrink: 0; }
    .log-msg { color: #c8e0b8; }
    .log-empty { color: #4a6050; font-style: italic; }

    .log-controls {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.8rem;
    }

    /* — FOOTER — */
    footer {
      border-top: 1.5px solid var(--border);
      padding: 1.5rem 3rem;
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.05em;
    }

    /* — ANIMATIONS — */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

 <header>
  <h1>Sam Tremellen</h1>
  <span class="tag">v1.0.0</span>
  <div class="headway-badge"></div>  <!-- ADD THIS LINE -->
</header>

  <main>

    <!-- Hero -->
    <section class="hero">
      <p class="section-label">Sam T Test</p>
      <p>A blank canvas, ready for whatever comes next.</p>
    </section>

    <!-- Status -->
    <div class="status-card">
      <div class="status-dot"></div>
      <div class="status-text"><strong>System online</strong> — all components operational</div>
    </div>

    <!-- Buttons -->
    <section class="buttons-section">
      <p class="section-label">Test Buttons</p>
      <div class="btn-grid">
        <button class="btn btn-primary"   onclick="log('Primary clicked')">▶ Primary</button>
        <button class="btn btn-secondary" onclick="log('Secondary clicked')">◇ Secondary</button>
        <button class="btn btn-accent"    onclick="log('Accent clicked')">✦ Accent</button>
        <button class="btn btn-ghost"     onclick="log('Ghost clicked')">· Ghost</button>
        <button class="btn btn-warm"      onclick="log('Warm clicked')">◌ Warm</button>
        <button class="btn btn-danger"    onclick="log('Danger clicked')">⚠ Danger</button>
        <button class="btn btn-disabled"  disabled>✕ Disabled</button>
        <button class="btn btn-loading"   onclick="log('Loading triggered')"><div class="spinner"></div> Loading</button>
        <button class="btn btn-secondary" onclick="showToast('Toast notification fired!')">↑ Toast</button>
        <button class="btn btn-ghost"     onclick="clearLog()">⌫ Clear Log</button>
      </div>
    </section>

    <!-- Log -->
    <section class="log-section">
      <p class="section-label">Event Log</p>
      <div class="log" id="log">
        <span class="log-empty">— no events yet —</span>
      </div>
    </section>

  </main>

  <footer>
    <span>Sam Tremellen Website</span>
    <span id="clock">—</span>
  </footer>

  <div id="toast"></div>

  <script>
    const logEl = document.getElementById('log');
    let logLines = [];

    function timestamp() {
      return new Date().toLocaleTimeString('en-AU', { hour12: false });
    }

    function log(msg) {
      logLines.push({ t: timestamp(), m: msg });
      renderLog();
      showToast(msg);
    }

    function renderLog() {
      if (!logLines.length) {
        logEl.innerHTML = '<span class="log-empty">— no events yet —</span>';
        return;
      }
      logEl.innerHTML = logLines.map(l =>
        `<div class="log-line"><span class="log-time">${l.t}</span><span class="log-msg">${l.m}</span></div>`
      ).join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      logLines = [];
      renderLog();
    }

    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Clock
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-AU', { hour12: false });
    }
    <script src="//cdn.headwayapp.co/widget.js"></script>
<script>
  var config = {
    selector: ".headway-badge",
    account: "yEPaOJ"
  };
  Headway.init(config);
</script>
</body>
</html>
